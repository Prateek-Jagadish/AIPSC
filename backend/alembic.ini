# alembic.ini
# ──────────────────────────────────────────────────────────────
# Alembic database migration configuration
# Run migrations with:
#   alembic revision --autogenerate -m "your message"
#   alembic upgrade head

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# timezone for file timestamps
timezone = Asia/Kolkata

# max length of slug in generated filename
truncate_slug_length = 40

# set to 'true' to run the environment during Alembic's "offline" mode.
prepend_sys_path = .

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
